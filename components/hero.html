<!-- ── HERO ── -->
<section id="home" class="relative min-h-screen flex items-center overflow-hidden pt-20">
  
  <!-- Background Network Animation -->
  <canvas id="hero-canvas" class="absolute inset-0 z-0 pointer-events-none"></canvas>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="relative z-10 max-w-6xl mx-auto px-2 sm:px-6 lg:px-8 w-full">
    <div class="grid md:grid-cols-2 gap-12 items-center">

      <div class="text-center md:text-left order-2 md:order-1 flex flex-col items-center md:items-start">
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold tracking-tight mb-6 leading-tight animate-slideUp">
          NGUYỄN ANH QUÂN
        </h1>
        <p class="text-lg md:text-xl text-gray-400 dark:text-gray-400 max-w-xl mb-4 animate-slideUp"
          style="animation-delay:.15s" data-i18n="hero_subtitle">
          Aspiring Business Analyst / Tech Professional
        </p>
        
        <!-- Button Download CV -->
        <div class="animate-slideUp py-6" style="animation-delay:.45s">
          <a href="../cv/NAQ_CV.pdf" 
             download="NguyenAnhQuan_CV.pdf"
             class="inline-flex items-center gap-3 scroll-link glass-card border-white/50 px-20 py-3.5 rounded-full font-medium hover:text-primary transition-colors ">
            <i class="fa-solid fa-download"></i>
            <span data-i18n="download_cv">Tải CV</span>
          </a>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row items-center md:items-start gap-4 animate-slideUp" style="animation-delay:.3s">
          <a href="#projects"
            class="scroll-link btn-primary px-8 py-3.5 rounded-full font-semibold flex items-center gap-2"
            data-i18n="hero_cta_primary">
            View My Projects
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </a>
          
          <a href="#contact"
            class="scroll-link glass-card px-8 py-3.5 rounded-full font-medium border-white/30 flex items-center gap-2 hover:text-primary transition-colors"
            data-i18n="hero_cta_secondary">
            <i data-lucide="mail" class="w-4 h-4"></i>
            Contact Me
          </a>
        </div>

      </div>

      <div class="flex justify-center md:justify-end order-1 md:order-2 animate-slideUp" style="animation-delay:.2s">
        <div class="relative group">
          <div class="absolute -inset-1 bg-linear-to-r from-primary to-secondary rounded-full blur opacity-40 group-hover:opacity-75 transition duration-1000 group-hover:duration-200 animate-glow-pulse"></div>

          <div class="relative w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 rounded-full overflow-hidden border-2 border-white/10 glass-card">
            <img src="./img/avt.jpg" alt="Nguyễn Anh Quân"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
    <i data-lucide="chevron-down" class="w-6 h-6 text-white/40"></i>
  </div>
</section>
