<section id="contact" class="py-8 relative z-10">
  <div class="max-w-6xl mx-auto px-4 md:px-8">
    <h2 class="section-title reveal" data-i18n="contact_title">Contact</h2>

    <div class="grid lg:grid-cols-2 gap-12 lg:gap-20 mt-12">

      <!-- Left: Contact Info -->
      <div class="space-y-6 reveal">

        <!-- Email -->
        <div class="glass-card rounded-2xl p-6 flex items-center gap-5">
          <div
            class="icon-circle text-primary shrink-0 border border-primary w-12 h-12 flex items-center justify-center">
            <i class="fa-solid fa-envelope text-2xl"></i>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1 uppercase tracking-wider" data-i18n="contact_email">Email</p>
            <a href="mailto:nq6122003@gmail.com"
              class="font-medium hover:text-primary transition-colors break-all">nq6122003@gmail.com</a>
          </div>
        </div>

        <!-- Phone -->
        <div class="glass-card rounded-2xl p-6 flex items-center gap-5">
          <div
            class="icon-circle text-secondary shrink-0 border border-primary w-12 h-12 flex items-center justify-center">
            <i class="fa-solid fa-phone text-2xl"></i>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1 uppercase tracking-wider" data-i18n="contact_phone">Phone</p>
            <a href="tel:0914693462" class="font-medium hover:text-secondary transition-colors">0914.693.462 &
              0365.993.614</a>
          </div>
        </div>

        <!-- Location -->
        <div class="glass-card rounded-2xl p-6 flex items-center gap-5">
          <div
            class="icon-circle text-accent shrink-0 border border-primary w-12 h-12 flex items-center justify-center">
            <i class="fa-solid fa-location-dot text-2xl"></i>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1 uppercase tracking-wider" data-i18n="about_location">Location</p>
            <p class="font-medium">Ho Chi Minh City, Vietnam</p>
          </div>
        </div>

        <!-- Social Links -->
        <div class="flex items-center justify-center gap-6 mt-8">
          <a href="https://github.com/DaszNAQ" target="_blank" rel="noopener noreferrer" class="social-btn"
            aria-label="GitHub">
            <i class="fa-brands fa-github text-xl"></i>
          </a>
          <a href="https://www.linkedin.com/in/qu%C3%A2n-nguy%E1%BB%85n-8853a6397/" target="_blank"
            rel="noopener noreferrer" class="social-btn" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in text-xl"></i>
          </a>
          <a href="#" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Facebook">
            <i class="fa-brands fa-facebook-f text-xl"></i>
          </a>
        </div>

      </div>

      <!-- Right: Contact Form -->
      <div class="glass-card rounded-2xl p-8 reveal" style="transition-delay:.15s">
        <form id="contactForm" novalidate>
          <div class="mb-5">
            <label for="contactName" class="form-label" data-i18n="contact_name">Name</label>
            <input type="text" id="contactName" name="name" class="form-input" placeholder="Your Name"
              autocomplete="name" />
            <p class="form-error hidden" id="nameError">Name must be at least 2 characters.</p>
          </div>

          <div class="mb-5">
            <label for="contactEmail" class="form-label" data-i18n="contact_email">Email</label>
            <input type="email" id="contactEmail" name="email" class="form-input" placeholder="email@example.com"
              autocomplete="email" />
            <p class="form-error hidden" id="emailError">Please enter a valid email address.</p>
          </div>

          <div class="mb-6">
            <label for="contactMessage" class="form-label" data-i18n="contact_message">Message</label>
            <textarea id="contactMessage" name="message" rows="5" class="form-input resize-none"
              placeholder="Your message here..."></textarea>
            <p class="form-error hidden" id="messageError">Message must be at least 10 characters.</p>
          </div>

          <button type="submit"
            class="btn-primary w-full py-4 rounded-xl flex items-center justify-center gap-2 font-semibold text-base">
            <i class="fa-solid fa-paper-plane w-5 h-5"></i>
            <span data-i18n="contact_submit">Send Message</span>
          </button>
        </form>

        <!-- Success Toast -->
        <div id="successToast"
          class="hidden mt-4 p-4 rounded-xl bg-green-500/15 border border-green-500/30 text-green-400 text-sm font-medium text-center"
          data-i18n="contact_success">
          Message sent successfully!
        </div>
      </div>

    </div>
  </div>
</section>
